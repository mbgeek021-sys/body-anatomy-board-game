<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Body Anatomy Board Game</title>
  <style>
    :root{
      --bg1:#07131a;
      --bg2:#0b2230;
      --text:#f7fcff;
      --muted:#c4d7df;
      --line:rgba(255,255,255,.12);
      --mint:#6de2d4;
      --teal:#2eb8a6;
      --cyan:#31a8ff;
      --pink:#ff62c7;
      --violet:#885dff;
      --orange:#ff9c43;
      --red:#ff647c;
      --green:#19c37d;
      --yellow:#f4c34f;
      --tile:#30465d;
      --shadow:0 24px 64px rgba(0,0,0,.32);
      --glow:0 0 18px rgba(109,226,212,.38);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;min-height:100%;font-family:Inter,system-ui,Arial,sans-serif;background:
      radial-gradient(circle at top left, rgba(49,168,255,.14), transparent 25%),
      radial-gradient(circle at top right, rgba(255,98,199,.12), transparent 22%),
      linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--text)}
    body{overflow-x:hidden}
    button,input{font:inherit}
    button{cursor:pointer}

    @keyframes logoBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes tileFloat{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(-50%,-53%)}}
    @keyframes tileGlow{0%,100%{box-shadow:0 10px 24px rgba(0,0,0,.28), inset 0 0 14px rgba(255,255,255,.06)}50%{box-shadow:0 14px 30px rgba(0,0,0,.34), 0 0 18px rgba(109,226,212,.22), inset 0 0 18px rgba(255,255,255,.08)}}
    @keyframes tokenHop{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-4px) scale(1.08)}}
    @keyframes boardShimmer{0%{transform:translateX(-20%)}100%{transform:translateX(120%)}}
    @keyframes rollPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}

    .screen{min-height:100vh;padding:14px}
    .glass{background:linear-gradient(180deg,rgba(13,30,44,.94),rgba(9,22,34,.92));border:1px solid var(--line);backdrop-filter:blur(14px);box-shadow:var(--shadow)}

    .lobby-wrap{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:1.08fr .92fr;gap:18px}
    .lobby-left,.lobby-right{border-radius:32px;padding:24px}
    .lobby-left{background:linear-gradient(145deg,#e9f6f8,#d7edf0);color:#11202a;border:1px solid rgba(0,0,0,.06)}
    .lobby-right{background:linear-gradient(180deg,#12283a,#0b1824)}
    .brand{display:flex;gap:16px;align-items:center}
    .logo{width:68px;height:68px;border-radius:22px;background:linear-gradient(135deg,var(--pink),var(--violet));display:grid;place-items:center;box-shadow:0 18px 30px rgba(136,93,255,.35);font-size:30px;color:#fff;animation:logoBob 2.6s ease-in-out infinite}
    .domain{font-size:12px;letter-spacing:.34em;text-transform:uppercase;font-weight:900;color:#157c74}
    .title{font-size:50px;line-height:.96;font-weight:1000;margin:.16em 0 .08em}
    .subtitle{font-size:14px;color:#536872}
    .code-box{margin-top:24px;border-radius:28px;padding:24px;background:#eff7f8;border:1px solid #d7e7ea}
    .code-big{margin-top:16px;border-radius:24px;padding:24px;background:linear-gradient(135deg,#5d8f89,#4b6e69);text-align:center;color:#fff}
    .code-big .small{font-size:12px;letter-spacing:.34em;text-transform:uppercase;font-weight:900;opacity:.84}
    .code-big .code{font-size:72px;font-weight:1000;letter-spacing:.08em}
    .lobby-tag{font-size:12px;letter-spacing:.32em;text-transform:uppercase;font-weight:900;color:#7ce6da}
    .lobby-title{font-size:44px;font-weight:1000;line-height:1.02;margin:.22em 0;color:#fff}
    .lobby-copy{font-size:14px;line-height:1.45;color:#c4d8df}
    .entry-card{margin-top:22px;border-radius:22px;padding:16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}
    .entry-label{font-size:11px;letter-spacing:.24em;text-transform:uppercase;font-weight:900;color:#9db8c2;margin-bottom:8px}
    .entry-input{width:100%;height:54px;border-radius:18px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);color:#fff;padding:0 14px;font-weight:700}
    .entry-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}

    .btn{border:none;border-radius:18px;padding:14px 16px;font-weight:1000;transition:.18s transform,.18s filter,.18s opacity;color:#fff}
    .btn:hover{transform:translateY(-2px);filter:brightness(1.06)}
    .btn:disabled{opacity:.55;cursor:not-allowed;transform:none;filter:none}
    .btn-white{background:#fff;color:#10202d}
    .btn-main{background:linear-gradient(135deg,var(--teal),var(--cyan))}
    .btn-blue{background:linear-gradient(135deg,#6798ff,#4c79db)}
    .btn-rose{background:linear-gradient(135deg,#ff6f9c,#db5f7e)}
    .btn-teal{background:linear-gradient(135deg,#59d0be,#27a996)}
    .btn-green{background:linear-gradient(135deg,#38cb93,#1ea56d)}
    .btn-small{padding:10px 12px;border-radius:14px;font-size:14px}

    .game-layout{display:flex;flex-direction:column;gap:18px;min-height:calc(100vh - 28px)}
    .topbar{border-radius:34px;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;gap:14px;background:linear-gradient(135deg,rgba(8,24,37,.95),rgba(14,52,54,.88));border:1px solid rgba(109,226,212,.14)}
    .topbar-left{display:flex;gap:18px;align-items:center;min-width:0}
    .topbar-title{font-size:clamp(34px,4vw,58px);font-weight:1000;line-height:.92}
    .topbar-meta{font-size:12px;color:var(--muted)}
    .chip-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .chip{padding:10px 14px;border-radius:999px;background:linear-gradient(135deg,rgba(255,255,255,.16),rgba(255,255,255,.08));font-size:13px;font-weight:900;border:1px solid rgba(255,255,255,.08)}
    .chip.alt{background:linear-gradient(135deg,var(--teal),var(--cyan))}

    .board-panel{position:relative;border-radius:38px;padding:16px;background:
      radial-gradient(circle at top left, rgba(255,98,199,.14), transparent 24%),
      radial-gradient(circle at bottom right, rgba(49,168,255,.14), transparent 24%),
      linear-gradient(180deg,rgba(8,21,31,.98),rgba(12,30,44,.96));border:1px solid rgba(255,255,255,.08)}
    .board-stage{position:relative;min-height:76vh;border-radius:30px;overflow:hidden;border:1px solid rgba(255,255,255,.14);background:radial-gradient(circle at 50% 38%, rgba(255,255,255,.16), transparent 26%),linear-gradient(180deg,#7db1aa 0%, #67958f 52%, #567d77 100%);box-shadow:inset 0 0 0 1px rgba(255,255,255,.05), inset 0 0 90px rgba(255,255,255,.08), inset 0 0 100px rgba(0,0,0,.12)}
    .board-stage::after{content:'';position:absolute;top:0;bottom:0;width:28%;background:linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent);transform:translateX(-20%);animation:boardShimmer 7s linear infinite;pointer-events:none;z-index:0}
    .board-rails{position:absolute;inset:14px;border-radius:24px;border:2px solid rgba(255,255,255,.16);pointer-events:none;z-index:0}
    .board-image{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;z-index:0;filter:drop-shadow(0 22px 30px rgba(0,0,0,.2))}
    .board-overlay{position:absolute;inset:0;background:radial-gradient(circle at center, rgba(255,255,255,.08), transparent 48%),linear-gradient(to bottom,rgba(8,15,20,.02),rgba(8,15,20,.12));z-index:0}
    .board-svg{position:absolute;inset:0;z-index:1}
    .board-label{position:absolute;z-index:5;font-size:12px;letter-spacing:.28em;text-transform:uppercase;font-weight:1000;color:rgba(255,255,255,.92)}
    .board-label.finish{top:18px;left:46%}
    .board-label.start{bottom:18px;left:18px}
    .board-hint{position:absolute;top:12px;right:12px;font-size:11px;background:rgba(0,0,0,.4);padding:8px 12px;border-radius:12px}

    .space{position:absolute;transform:translate(-50%,-50%);width:96px;height:60px;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px;text-align:center;color:#fff;border:2px solid rgba(255,255,255,.2);box-shadow:0 10px 24px rgba(0,0,0,.28), inset 0 0 14px rgba(255,255,255,.06);z-index:3;transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;background:linear-gradient(145deg,#334a63,#243549);animation:tileFloat 2.8s ease-in-out infinite, tileGlow 2.8s ease-in-out infinite;animation-delay:var(--delay,0s)}
    .space:hover{transform:translate(-50%,-50%) scale(1.08);box-shadow:0 14px 30px rgba(0,0,0,.34),0 0 18px rgba(109,226,212,.35)}
    .space.start{background:linear-gradient(145deg,#1fd07f,#169f65)}
    .space.finish{background:linear-gradient(145deg,var(--pink),var(--violet))}
    .space.safe{background:linear-gradient(145deg,var(--teal),#227a6d)}
    .space.health{background:linear-gradient(145deg,var(--cyan),#1d70a4)}
    .space.risk{background:linear-gradient(145deg,var(--red),#ab4259)}
    .space.quarantine{background:linear-gradient(145deg,var(--orange),#bb5f23)}
    .space.chance{background:linear-gradient(145deg,var(--violet),#5640be)}
    .space.energy{background:linear-gradient(145deg,var(--yellow),#bb8b19);color:#1a1a1a}
    .space.surgery{background:linear-gradient(145deg,#ff8b4a,#ba5622)}
    .space-id{font-size:9px;line-height:1;font-weight:1000;opacity:.8}
    .space-name{font-size:11px;line-height:1.05;font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
    .space-body{font-size:8px;line-height:1;opacity:.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
    .space-tokens{display:flex;gap:4px;flex-wrap:wrap;min-height:12px;justify-content:center}
    .token-pill{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;border-radius:999px;background:rgba(2,6,23,.92);font-size:13px;font-weight:1000;color:#fff;box-shadow:0 3px 8px rgba(0,0,0,.26);animation:tokenHop .9s ease-in-out infinite}
    .token-with-name{display:flex;align-items:center;gap:4px;background:rgba(2,6,23,.9);padding:2px 6px 2px 2px;border-radius:999px;box-shadow:0 4px 10px rgba(0,0,0,.24);max-width:88px}
    .token-name{font-size:9px;line-height:1;font-weight:900;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:54px}
    .space.quarantine{outline:3px solid rgba(255,100,124,.55);box-shadow:0 12px 28px rgba(0,0,0,.34),0 0 18px rgba(255,100,124,.28)}
    .space.safe{box-shadow:0 12px 28px rgba(0,0,0,.34),0 0 18px rgba(46,184,166,.22)}
    .hover-tag{position:absolute;z-index:6;transform:translate(10px,-50%);background:#10b981;border:1px solid rgba(255,255,255,.58);border-radius:999px;padding:5px 8px;font-size:10px;font-weight:1000;box-shadow:0 8px 18px rgba(0,0,0,.22)}

    .hud-wrap{display:grid;grid-template-columns:1fr 1.2fr 1.2fr 1fr;gap:16px}
    .hud-card{border-radius:28px;padding:16px;background:linear-gradient(180deg,rgba(9,24,36,.96),rgba(13,30,44,.94));border:1px solid rgba(255,255,255,.08)}
    .sync-note{font-size:12px;color:var(--muted);margin-top:8px}
    [data-action="roll"]{animation:rollPulse 1.8s ease-in-out infinite}
    .hud-title{font-size:22px;font-weight:1000;margin:0 0 12px}
    .turn-hero{border-radius:24px;padding:18px;background:linear-gradient(135deg,#7ff4e0 0%, #48c6d6 52%, #4d82ff 100%);color:#fff}
    .turn-hero h3{margin:0;font-size:34px;line-height:.94}
    .turn-hero p{margin:6px 0 0;font-size:13px;opacity:.92}
    .controls-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .mini-box{border-radius:18px;padding:12px;background:rgba(255,255,255,.04);font-size:12px;color:#b9cbd1;margin-top:12px}
    .players-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
    .player-card,.leader-card{border-radius:18px;padding:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
    .player-top{display:flex;gap:10px;align-items:center;margin-bottom:10px}
    .avatar{width:44px;height:44px;display:grid;place-items:center;border-radius:16px;background:linear-gradient(135deg,#6884a5,#4b6684);font-size:20px}
    .name-input{flex:1;height:42px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);color:#fff;padding:0 12px;font-weight:700}
    .stats{display:flex;gap:6px;flex-wrap:wrap}
    .badge{padding:6px 10px;border-radius:999px;font-size:11px;font-weight:900;background:#334155;display:inline-flex;align-items:center;gap:4px}
    .badge.teal{background:#0f766e}.badge.green{background:#15803d}.badge.gray{background:#475569}
    .action-box{min-height:112px;border-radius:18px;padding:14px;background:rgba(255,255,255,.04);font-size:14px;color:#dfe8e8;line-height:1.42}
    .feedback{margin-bottom:12px;border-radius:16px;padding:12px;font-size:14px;font-weight:900}
    .feedback.good{background:rgba(16,185,129,.18);color:#d7fff4}
    .feedback.bad{background:rgba(244,63,94,.18);color:#ffe4ea}
    .leaderboard-list{display:flex;flex-direction:column;gap:10px;max-height:240px;overflow:auto}
    .leader-row{display:flex;justify-content:space-between;gap:12px;align-items:center}
    .leader-left{display:flex;gap:8px;align-items:center;min-width:0}
    .leader-rank{font-size:12px;color:#9fb0b8}.leader-name{font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    .trivia-modal{position:fixed;inset:0;display:none;place-items:center;background:rgba(2,6,23,.68);backdrop-filter:blur(10px);z-index:200;padding:16px}
    .trivia-modal.show{display:grid}
    .trivia-card{position:relative;z-index:201;width:min(760px,100%);border-radius:34px;padding:18px;background:linear-gradient(180deg,rgba(8,22,32,.98),rgba(13,30,44,.96));border:1px solid rgba(255,255,255,.1);box-shadow:0 24px 60px rgba(0,0,0,.4)}
    .trivia-top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}
    .trivia-q{border-radius:18px;background:rgba(255,255,255,.05);padding:18px;line-height:1.4;margin-bottom:14px;font-size:20px;font-weight:900}
    .trivia-grid{display:grid;gap:12px}
    .trivia-choice{width:100%;text-align:center;font-size:18px;padding:18px}
    .pill-time{padding:10px 14px;border-radius:999px;background:#d8fff2;color:#0b2d22;font-weight:1000}
    .footer-note{font-size:12px;color:#afc4c0}

    @media (max-width:1150px){.hud-wrap{grid-template-columns:1fr 1fr}.players-strip{grid-template-columns:1fr 1fr}}
    @media (max-width:900px){.hud-wrap{grid-template-columns:1fr}.players-strip{grid-template-columns:1fr}.space{width:82px;height:54px}}
    @media (max-width:700px){.screen{padding:10px}.title{font-size:34px}.code-big .code{font-size:50px}.space{width:68px;height:42px;padding:4px}.space-id{font-size:7px}.space-name{font-size:8px}.space-body{font-size:7px}}
  </style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const SITE_DOMAIN='bodyanatomyboardgame.com',GAME_TITLE='Body Anatomy Board Game',SUBTITLE='Class MIB Group Project — Beverly, Stephanie, Lizeth',SCHOOL='North-West College • West Covina, CA • Medical Insurance Biller',ANATOMY_IMAGE_URL='./body%20anatomy%20mib.png',MAX_PLAYERS=10;

const SYNC_CONFIG={
  url:'PASTE_YOUR_SUPABASE_URL',
  anonKey:'PASTE_YOUR_SUPABASE_ANON_KEY'
}

const STORAGE_KEYS={
  clientId:'anatomy-board-client-id',
  playerName:'anatomy-board-player-name'
}

const clientId=localStorage.getItem(STORAGE_KEYS.clientId)||crypto.randomUUID()
localStorage.setItem(STORAGE_KEYS.clientId,clientId)

let supabase=null
let roomChannel=null
let suppressBroadcast=false
let pendingNameSave=null
let isApplyingRemoteState=false

const state={entered:false,roomCode:randomRoomCode(),joinCode:'',players:createPlayers(1),currentPlayerIndex:0,lastRoll:null,lastCard:{text:'Roll the dice to begin.'},winner:null,trivia:null,timer:30,feedback:null,hoverId:null,soundOn:true,movingPlayerId:null,isRolling:false,isOnline:false,onlineCount:1,myPlayerId:1,connectionLabel:'Offline demo mode'};

const TRIVIA_QUESTIONS=[{q:'What organ pumps blood through the body?',choices:['Lung','Heart','Liver','Kidney'],a:'Heart',reward:3},{q:'What do lungs help you do?',choices:['Breathe','Digest','Think','Walk'],a:'Breathe',reward:2},{q:'What is the largest organ of the body?',choices:['Skin','Brain','Stomach','Heart'],a:'Skin',reward:3},{q:'Which body part controls the nervous system?',choices:['Heart','Brain','Colon','Pancreas'],a:'Brain',reward:3},{q:'What connects muscles to bones?',choices:['Veins','Ligaments','Tendons','Nerves'],a:'Tendons',reward:2},{q:'True or False: The femur is a bone in the leg.',choices:['True','False'],a:'True',reward:1},{q:'True or False: The heart is part of the digestive system.',choices:['True','False'],a:'False',reward:1}];
const ORGAN_POOL=['Brain','Heart','Liver','Lungs','Stomach','Pancreas','Kidneys','Spleen','Bladder','Intestines'];
const HEALTH_CARDS=[{text:'Escape quarantine.',effect:p=>({...p,quarantined:0})},{text:'Healthy diet. Roll again.',effect:p=>({...p,extraTurn:true})},{text:'You wash your hands. Move forward 3 spaces.',effect:p=>({...p,position:Math.min(SPACES.length-1,p.position+3)})}];
const RISK_CARDS=[{text:"Didn't cover cough. Go to quarantine.",effect:p=>({...p,quarantined:1})},{text:'Poor hygiene. Move back 2.',effect:p=>({...p,position:Math.max(0,p.position-2)})}];
const CHANCE_CARDS=[{text:'Referral card. Move forward 2.',effect:p=>({...p,position:Math.min(SPACES.length-1,p.position+2)})},{text:'Chance card: collect an organ card.',effect:p=>({...p}),collectOrgan:true}];
const ENERGY_CARDS=[{text:'Choose someone to take 5 steps back while you take 1 step forward.',effect:p=>({...p,position:Math.min(SPACES.length-1,p.position+1)}),attackBack:5},{text:'Move 1 step forward and the next person misses a turn.',effect:p=>({...p,position:Math.min(SPACES.length-1,p.position+1)}),nextMiss:true}];
const SURGERY_CARDS=[{text:'Surgery Card: Lose a turn.',effect:p=>({...p,skipped:1})}];
const ANATOMY_TERMS=[['Heel','Feet'],['Toes','Feet'],['Metatarsals','Feet'],['Talus','Feet'],['Calcaneus','Feet'],['Achilles Tendon','Lower Leg'],['Tibia','Lower Leg'],['Fibula','Lower Leg'],['Patella','Knee'],['Knee Joint','Knee'],['Quadriceps','Upper Leg'],['Hamstrings','Upper Leg'],['Femur','Upper Leg'],['Hip Joint','Hip'],['Pelvis','Pelvis'],['Bladder','Pelvis'],['Uterus','Pelvis'],['Rectum','Digestive'],['Appendix','Digestive'],['Colon','Digestive'],['Small Intestine','Digestive'],['Gallbladder','Digestive'],['Liver','Digestive'],['Pancreas','Digestive'],['Spleen','Immune'],['Stomach','Digestive'],['Esophagus','Upper Body'],['Diaphragm','Thorax'],['Aorta','Thorax'],['Ribs','Thorax'],['Sternum','Thorax'],['Lungs','Thorax'],['Bronchi','Thorax'],['Trachea','Neck'],['Heart','Thorax'],['Clavicle','Shoulder'],['Scapula','Shoulder'],['Humerus','Arm'],['Biceps','Arm'],['Radius','Forearm'],['Ulna','Forearm'],['Thumb','Hand'],['Index Finger','Hand'],['Eyes','Head'],['Nasal Cavity','Head'],['Teeth','Head'],['Temporal Bone','Head'],['Frontal Bone','Head'],['Parietal Bone','Head'],['Brain Stem','Brain'],['Cerebellum','Brain'],['Frontal Lobe','Brain']];
const PATH_POINTS=[[6,94],[16,94],[28,94],[40,94],[52,94],[64,94],[76,94],[88,94],[88,80],[76,80],[64,80],[52,80],[40,80],[28,80],[16,80],[16,66],[28,66],[40,66],[52,66],[64,66],[76,66],[88,66],[88,52],[76,52],[64,52],[52,52],[40,52],[28,52],[16,52],[16,38],[28,38],[40,38],[52,38],[64,38],[76,38],[88,38],[88,24],[76,24],[64,24],[52,24],[40,24],[28,24],[16,24],[16,12],[28,12],[40,12],[52,12],[64,12],[76,12],[88,12]];

function randomRoomCode(){return Math.random().toString(36).slice(2,7).toUpperCase()}
function createPlayers(count){const savedName=localStorage.getItem(STORAGE_KEYS.playerName)||'Player 1';return Array.from({length:count},(_,i)=>({id:i+1,name:i===0?savedName:`Player ${i+1}`,position:0,shields:0,quarantined:0,skipped:0,extraTurn:false,score:0,organs:[],ownerId:i===0?clientId:null}))}
function getPlayerToken(index){const items=['🩺','💉','💊','🩹','🌡️','✂️','🫁','🧠','🧴','🏥'];return items[index]||'🏥'}
function getPlayerName(player){return(player?.name||'').trim()||`Player ${player?.id??''}`}
function specialSpaceType(id){const map={0:'start',4:'safe',8:'health',10:'quarantine',12:'chance',16:'risk',20:'safe',24:'health',28:'quarantine',32:'chance',36:'energy',40:'risk',44:'safe',46:'quarantine',48:'health'};return map[id]||'normal'}
function anchorForPoint(x,y){const centerX=48.5,bodyBand=y>86?8:y>72?11:y>58?15:y>44?18:y>30?14:10;if(x<centerX-6)return{anchorX:centerX-bodyBand,anchorY:y};if(x>centerX+6)return{anchorX:centerX+bodyBand,anchorY:y};return{anchorX:centerX,anchorY:y}}
function generateBoardSpaces(){const spaces=[];spaces.push({id:0,name:'Start',body:'Feet',type:'start',x:PATH_POINTS[0][0],y:PATH_POINTS[0][1],...anchorForPoint(PATH_POINTS[0][0],PATH_POINTS[0][1])});for(let i=1;i<PATH_POINTS.length-1;i+=1){const point=PATH_POINTS[i],term=ANATOMY_TERMS[(i-1)%ANATOMY_TERMS.length];spaces.push({id:i,name:term[0],body:term[1],type:specialSpaceType(i),x:point[0],y:point[1],...anchorForPoint(point[0],point[1])})}spaces.push({id:PATH_POINTS.length-1,name:'Brain',body:'Finish',type:'finish',x:PATH_POINTS[PATH_POINTS.length-1][0],y:PATH_POINTS[PATH_POINTS.length-1][1],...anchorForPoint(PATH_POINTS[PATH_POINTS.length-1][0],PATH_POINTS[PATH_POINTS.length-1][1])});return spaces}
const SPACES=generateBoardSpaces();
function chooseRandomCard(cards){return cards[Math.floor(Math.random()*cards.length)]}
function getCardDeckByType(type){if(type==='health')return HEALTH_CARDS;if(type==='risk')return RISK_CARDS;if(type==='chance')return CHANCE_CARDS;if(type==='energy')return ENERGY_CARDS;if(type==='surgery')return SURGERY_CARDS;return null}
function ensureAudioContext(){const AudioCtx=window.AudioContext||window.webkitAudioContext;if(!AudioCtx)return null;if(!window.__abgAudioCtx)window.__abgAudioCtx=new AudioCtx();if(window.__abgAudioCtx.state==='suspended')void window.__abgAudioCtx.resume();return window.__abgAudioCtx}
function playTone(freq,start,duration,volume=.03,type='sine'){const ctx=ensureAudioContext();if(!ctx)return;const osc=ctx.createOscillator(),gain=ctx.createGain();osc.type=type;osc.frequency.setValueAtTime(freq,start);gain.gain.setValueAtTime(0.0001,start);gain.gain.exponentialRampToValueAtTime(volume,start+0.01);gain.gain.exponentialRampToValueAtTime(0.0001,start+duration);osc.connect(gain);gain.connect(ctx.destination);osc.start(start);osc.stop(start+duration+0.02)}
function playDiceSound(){const ctx=ensureAudioContext();if(!ctx)return;const now=ctx.currentTime,buffer=ctx.createBuffer(1,ctx.sampleRate*0.45,ctx.sampleRate),data=buffer.getChannelData(0);for(let i=0;i<data.length;i+=1)data[i]=(Math.random()*2-1)*(1-i/data.length);for(let i=0;i<5;i+=1){const source=ctx.createBufferSource(),band=ctx.createBiquadFilter(),gain=ctx.createGain();source.buffer=buffer;band.type='bandpass';band.frequency.setValueAtTime(720-i*95,now+i*0.05);gain.gain.setValueAtTime(0.0001,now+i*0.05);gain.gain.exponentialRampToValueAtTime(0.06,now+i*0.05+0.01);gain.gain.exponentialRampToValueAtTime(0.0001,now+i*0.05+0.11);source.connect(band);band.connect(gain);gain.connect(ctx.destination);source.start(now+i*0.05);source.stop(now+i*0.05+0.12)}}
function playSuccessSound(){const ctx=ensureAudioContext();if(!ctx)return;const now=ctx.currentTime;playTone(523,now,.14,.04);playTone(659,now+.12,.16,.04);playTone(784,now+.24,.18,.04)}

function sleep(ms){return new Promise(resolve=>setTimeout(resolve,ms))}

function connectSupabase(){
  if(!SYNC_CONFIG.url||!SYNC_CONFIG.anonKey||SYNC_CONFIG.url.includes('PASTE_')||SYNC_CONFIG.anonKey.includes('PASTE_')){state.isOnline=false;state.connectionLabel='Offline demo mode';return}
  supabase=createClient(SYNC_CONFIG.url,SYNC_CONFIG.anonKey)
  state.connectionLabel='Online ready'
}

function serializeState(){
  return {players:state.players,currentPlayerIndex:state.currentPlayerIndex,lastRoll:state.lastRoll,lastCard:state.lastCard,winner:state.winner,feedback:state.feedback,roomCode:state.roomCode}
}

function normalizePlayers(players){
  return players.map((player,index)=>({
    id:index+1,
    name:player.name,
    position:player.position??0,
    shields:player.shields??0,
    quarantined:player.quarantined??0,
    skipped:player.skipped??0,
    extraTurn:false,
    score:player.score??0,
    organs:Array.isArray(player.organs)?player.organs:[],
    ownerId:player.ownerId??null
  }))
}

function applySerializedState(nextState){
  const incomingPlayers=Array.isArray(nextState.players)?normalizePlayers(nextState.players):state.players
  state.players=incomingPlayers
  state.currentPlayerIndex=Math.min(nextState.currentPlayerIndex??0, Math.max(0, incomingPlayers.length-1))
  state.lastRoll=nextState.lastRoll??null
  state.lastCard=nextState.lastCard??{text:'Roll the dice to begin.'}
  state.winner=nextState.winner??null
  state.feedback=nextState.feedback??null
  const mine=incomingPlayers.find(player=>player.ownerId===clientId)
  state.myPlayerId=mine?mine.id:1
}

function getPresenceClients(){
  if(!roomChannel)return []
  const presence=roomChannel.presenceState()
  return Object.values(presence).flatMap(entry=>entry).filter(Boolean)
}

function reconcilePlayersFromPresence(){
  const metas=getPresenceClients()
  const byOwner=new Map(state.players.map(player=>[player.ownerId,player]))
  const nextPlayers=[]
  for(const meta of metas){
    const ownerId=meta.clientId
    let player=byOwner.get(ownerId)
    if(!player){
      player={id:0,name:meta.name||`Player ${nextPlayers.length+1}`,position:0,shields:0,quarantined:0,skipped:0,extraTurn:false,score:0,organs:[],ownerId}
    }
    player={...player,name:meta.name||player.name,ownerId}
    nextPlayers.push(player)
  }
  if(nextPlayers.length===0){
    nextPlayers.push(...state.players)
  }
  state.players=normalizePlayers(nextPlayers)
  const mine=state.players.find(player=>player.ownerId===clientId)
  state.myPlayerId=mine?mine.id:1
  state.onlineCount=state.players.length
  if(state.currentPlayerIndex>=state.players.length) state.currentPlayerIndex=0
}

async function updatePresenceName(name){
  if(roomChannel){
    await roomChannel.track({clientId,name,roomCode:state.roomCode})
  }
}

async function joinRoomChannel(){
  if(!supabase||!state.entered)return
  if(roomChannel){await roomChannel.unsubscribe();roomChannel=null}
  const topic=`room:${state.roomCode}`
  roomChannel=supabase.channel(topic,{config:{broadcast:{self:false},presence:{key:clientId}}})
  roomChannel
    .on('broadcast',{event:'state-sync'},payload=>{
      if(!payload?.payload||payload.payload.sender===clientId)return
      suppressBroadcast=true
      isApplyingRemoteState=true
      applySerializedState(payload.payload.state)
      state.isOnline=true
      state.connectionLabel='Live sync connected'
      suppressBroadcast=false
      isApplyingRemoteState=false
      render()
    })
    .on('presence',{event:'sync'},async ()=>{
      reconcilePlayersFromPresence()
      state.isOnline=true
      state.connectionLabel='Live sync connected'
      render()
      await broadcastState()
    })
  await roomChannel.subscribe(async status=>{
    if(status==='SUBSCRIBED'){
      await roomChannel.track({clientId,name:localStorage.getItem(STORAGE_KEYS.playerName)||'Player 1',roomCode:state.roomCode})
      state.isOnline=true
      state.connectionLabel='Live sync connected'
      render()
    }
  })
}

async function broadcastState(force=false){
  if(!roomChannel||suppressBroadcast||isApplyingRemoteState)return
  const payload={sender:clientId,state:serializeState()}
  try{
    await roomChannel.send({type:'broadcast',event:'state-sync',payload})
    if(force)state.connectionLabel='Live sync connected'
  }catch(e){console.error(e)}
}

function saveNameQuietly(id,value){
  state.players=state.players.map(player=>player.id===id?{...player,name:value.slice(0,18)}:player)
  if(id===state.myPlayerId)localStorage.setItem(STORAGE_KEYS.playerName,value.slice(0,18))
}

async function commitNameChange(id,value){
  const nextValue=value.slice(0,18)
  saveNameQuietly(id,nextValue)
  if(id===state.myPlayerId){
    await updatePresenceName(nextValue)
  }
  await broadcastState()
}

function startTrivia(){state.trivia=TRIVIA_QUESTIONS[Math.floor(Math.random()*TRIVIA_QUESTIONS.length)];state.timer=30;state.feedback=null;render()}
function applyCardForType(type,player){const deck=getCardDeckByType(type);if(!deck)return{player,card:null,attackBack:0,nextMiss:false,organAward:null};const picked=chooseRandomCard(deck);let updatedPlayer=picked.effect(player),organAward=null;if(picked.collectOrgan){const available=ORGAN_POOL.filter(organ=>!updatedPlayer.organs.includes(organ));organAward=available.length?available[Math.floor(Math.random()*available.length)]:ORGAN_POOL[Math.floor(Math.random()*ORGAN_POOL.length)];updatedPlayer={...updatedPlayer,organs:[...updatedPlayer.organs,organAward]}}return{player:updatedPlayer,card:picked,attackBack:picked.attackBack||0,nextMiss:!!picked.nextMiss,organAward}}
async function handleRoll(){if(state.winner||state.trivia||state.isRolling)return;const currentPlayer=state.players[state.currentPlayerIndex];if(!currentPlayer)return;playDiceSound();state.feedback=null;state.isRolling=true;if(Math.random()<0.24){state.isRolling=false;startTrivia();return}const roll=Math.floor(Math.random()*6)+1;state.lastRoll=roll;const updated=[...state.players];let player={...updated[state.currentPlayerIndex]};if(player.skipped>0){player.skipped-=1;updated[state.currentPlayerIndex]=player;state.players=updated;state.lastCard={text:`${getPlayerName(player)} lost this turn.`};state.currentPlayerIndex=(state.currentPlayerIndex+1)%updated.length;state.isRolling=false;render();await broadcastState();return}if(player.quarantined>0){player.quarantined-=1;updated[state.currentPlayerIndex]=player;state.players=updated;state.lastCard={text:`${getPlayerName(player)} is in quarantine and must stay 1 turn.`};state.currentPlayerIndex=(state.currentPlayerIndex+1)%updated.length;state.isRolling=false;render();await broadcastState();return}state.movingPlayerId=player.id;render();for(let step=0;step<roll;step+=1){player.position=Math.min(SPACES.length-1,player.position+1);updated[state.currentPlayerIndex]=player;state.players=updated;render();await sleep(180);if(player.position>=SPACES.length-1)break}const landed=SPACES[player.position];let extraTurn=false,logText=`${getPlayerName(player)} landed on ${landed.name}.`;if(landed.type==='safe'){player.shields+=1;player.score+=1;logText=`${getPlayerName(player)} reached a safe point and gained 1 shield.`}if(landed.type==='quarantine'){player.quarantined=1;player.score=Math.max(0,player.score-1);logText=`${getPlayerName(player)} landed on a bad quarantine spot: lose 1 point and stay 1 turn.`}if(['health','risk','chance','energy','surgery'].includes(landed.type)){const result=applyCardForType(landed.type,player);player=result.player;extraTurn=!!player.extraTurn;player.extraTurn=false;if(result.attackBack>0&&state.players.length>1){const targetIndex=(state.currentPlayerIndex+1)%updated.length,target={...updated[targetIndex]};target.position=Math.max(0,target.position-result.attackBack);updated[targetIndex]=target;logText=`${result.card?.text||'Energy card.'} ${getPlayerName(target)} goes back ${result.attackBack} spaces.`}else if(result.nextMiss&&state.players.length>1){const targetIndex=(state.currentPlayerIndex+1)%updated.length,target={...updated[targetIndex]};target.skipped+=1;updated[targetIndex]=target;logText=`${result.card?.text||'Energy card.'} ${getPlayerName(target)} misses the next turn.`}else if(result.organAward){logText=`${result.card?.text||'Chance card.'} ${getPlayerName(player)} collected the ${result.organAward} organ card.`}else if(result.card){logText=result.card.text}}if(player.position>=SPACES.length-1){player.position=SPACES.length-1;state.winner=player.name;logText=`${getPlayerName(player)} reached the brain. Quick recovery!`}updated[state.currentPlayerIndex]=player;state.players=updated;state.lastCard={text:logText};state.movingPlayerId=null;state.isRolling=false;if(!extraTurn&&player.position<SPACES.length-1)state.currentPlayerIndex=(state.currentPlayerIndex+1)%updated.length;render();await broadcastState()}
async function submitTrivia(answer){if(!state.trivia)return;const correct=answer===state.trivia.a,reward=state.trivia.reward||2,updated=[...state.players],player={...updated[state.currentPlayerIndex]};if(correct){player.position=Math.min(SPACES.length-1,player.position+reward);player.score+=reward}if(player.position>=SPACES.length-1){player.position=SPACES.length-1;state.winner=player.name}updated[state.currentPlayerIndex]=player;state.players=updated;state.feedback={ok:correct,text:correct?`Correct! Move forward ${reward} ${reward===1?'space':'spaces'}.`:'Wrong answer. Stay in the same spot.'};state.lastCard={text:correct?`${getPlayerName(player)} answered correctly and moved forward ${reward} ${reward===1?'space':'spaces'}.`:`${getPlayerName(player)} answered incorrectly and stayed in place.`};if(correct)playSuccessSound();else playFailSound();state.trivia=null;state.timer=30;render();await broadcastState()}
