<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Body Anatomy Board Game</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f2e2c, #1c4d4a);
  color: white;
}

.container {
  display: flex;
  height: 100vh;
}

/* LEFT GAME BOARD */
.board {
  flex: 3;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* IMAGE */
.board img {
  width: 80%;
  max-height: 95%;
  object-fit: contain;
}

/* PATH TILES */
.tile {
  position: absolute;
  width: 60px;
  height: 60px;
  background: #1f3a44;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  text-align: center;
  padding: 4px;
  transition: transform 0.2s;
}

.tile.active {
  background: #00d4a3;
  transform: scale(1.2);
}

/* RIGHT PANEL */
.panel {
  flex: 1;
  background: #0b1f25;
  padding: 20px;
}

button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 12px;
  background: #00bfa6;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #00d4b0;
}
</style>
</head>

<body>

<div class="container">

  <!-- BOARD -->
  <div class="board" id="board">
    <img src="./body%20anatomy%20mib.png" />
  </div>

  <!-- PANEL -->
  <div class="panel">
    <h2>Controls</h2>
    <button onclick="rollDice()">🎲 Roll Dice</button>
    <p id="pos">Position: 0</p>
  </div>

</div>

<script>
const board = document.getElementById("board");

let playerPos = 0;
const totalTiles = 100;

/* CREATE SNAKE PATH */
const path = [];

for (let i = 0; i < totalTiles; i++) {
  let x = 10 + (i % 10) * 7;
  let y = 90 - Math.floor(i / 10) * 8;

  const tile = document.createElement("div");
  tile.className = "tile";
  tile.innerText = i === 0 ? "Start" : i === totalTiles - 1 ? "Brain 🧠" : i;

  tile.style.left = x + "%";
  tile.style.top = y + "%";

  board.appendChild(tile);
  path.push(tile);
}

function rollDice() {
  const roll = Math.floor(Math.random() * 6) + 1;

  path[playerPos].classList.remove("active");

  playerPos += roll;
  if (playerPos >= totalTiles) {
    alert("You reached the brain 🧠 YOU WIN!");
    playerPos = 0;
  }

  path[playerPos].classList.add("active");
  document.getElementById("pos").innerText = "Position: " + playerPos;
}
</script>

</body>
</html>
