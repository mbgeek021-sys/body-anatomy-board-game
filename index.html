function getPlayerToken(index){const items=['🩺','💉','💊','🩹','🌡️','✂️','🫁','🧠','🧴','🏥'];return items[index]||'🏥'}
function getPlayerName(player){return(player?.name||'').trim()||`Player ${player?.id??''}`}
function specialSpaceType(id){const map={0:'start',5:'safe',9:'health',13:'quarantine',17:'chance',21:'risk',25:'safe',29:'health',33:'quarantine',37:'chance',41:'energy',45:'risk',49:'safe',53:'quarantine',57:'health',61:'chance',65:'risk',69:'safe'};return map[id]||'normal'}
function generateBoardSpaces(){const spaces=[];spaces.push({id:0,name:'Start',body:'Feet',type:'start',x:PATH_POINTS[0][0],y:PATH_POINTS[0][1]});for(let i=1;i<PATH_POINTS.length-1;i+=1){const point=PATH_POINTS[i],term=ANATOMY_TERMS[(i-1)%ANATOMY_TERMS.length];spaces.push({id:i,name:term[0],body:term[1],type:specialSpaceType(i),x:point[0],y:point[1]})}spaces.push({id:PATH_POINTS.length-1,name:'Brain',body:'Finish',type:'finish',x:PATH_POINTS[PATH_POINTS.length-1][0],y:PATH_POINTS[PATH_POINTS.length-1][1]});return spaces}
const SPACES=generateBoardSpaces();

function createBasePlayer(ownerId,name){return{id:0,name:name||'Player',position:0,shields:0,quarantined:0,skipped:0,extraTurn:false,score:0,organs:[],ownerId}}
function normalizePlayers(players){return players.map((p,i)=>({...createBasePlayer(p.ownerId,p.name),...p,id:i+1,organs:Array.isArray(p.organs)?p.organs:[]}))}
function currentPlayer(){return state.players[state.currentPlayerIndex]||state.players[0]||null}
function myPlayer(){return state.players.find(p=>p.ownerId===clientId)||null}
function isSupabaseConfigured(){return SUPABASE_CONFIG.url&&!SUPABASE_CONFIG.url.includes('PASTE')&&SUPABASE_CONFIG.anonKey&&!SUPABASE_CONFIG.anonKey.includes('PASTE')}

function getAudioCtx(){const AudioCtx=window.AudioContext||window.webkitAudioContext;if(!AudioCtx)return null;if(!window.__bodyGameAudioCtx)window.__bodyGameAudioCtx=new AudioCtx();return window.__bodyGameAudioCtx}
async function unlockAudio(){const ctx=getAudioCtx();if(!ctx)return null;if(ctx.state==='suspended')await ctx.resume();return ctx}
function playTone(ctx,freq,start,duration,type='sine',gainValue=.03){const osc=ctx.createOscillator();const gain=ctx.createGain();osc.type=type;osc.frequency.setValueAtTime(freq,start);gain.gain.setValueAtTime(0.0001,start);gain.gain.exponentialRampToValueAtTime(gainValue,start+0.01);gain.gain.exponentialRampToValueAtTime(0.0001,start+duration);osc.connect(gain);gain.connect(ctx.destination);osc.start(start);osc.stop(start+duration+0.03)}
async function playDiceSound(){const ctx=await unlockAudio();if(!ctx)return;const now=ctx.currentTime;playTone(ctx,150,now,.08,'triangle',.05);playTone(ctx,210,now+.06,.08,'triangle',.05);playTone(ctx,120,now+.12,.08,'square',.04);playTone(ctx,300,now+.18,.07,'triangle',.035)}
async function playTriviaOpenSound(){const ctx=await unlockAudio();if(!ctx)return;const now=ctx.currentTime;playTone(ctx,440,now,.08,'sine',.03);playTone(ctx,660,now+.08,.08,'sine',.03);playTone(ctx,880,now+.16,.1,'sine',.03)}
async function playCorrectSound(){const ctx=await unlockAudio();if(!ctx)return;const now=ctx.currentTime;playTone(ctx,523,now,.08,'triangle',.04);playTone(ctx,659,now+.08,.08,'triangle',.04);playTone(ctx,784,now+.16,.12,'triangle',.04)}
async function playWrongSound(){const ctx=await unlockAudio();if(!ctx)return;const now=ctx.currentTime;playTone(ctx,240,now,.12,'sawtooth',.04);playTone(ctx,180,now+.1,.15,'sawtooth',.04)}
async function playSafeSound(){const ctx=await unlockAudio();if(!ctx)return;const now=ctx.currentTime;playTone(ctx,740,now,.06,'triangle',.03);playTone(ctx,980,now+.06,.08,'triangle',.03)}
async function playQuarantineSound(){const ctx=await unlockAudio();if(!ctx)return;const now=ctx.currentTime;playTone(ctx,160,now,.12,'square',.04);playTone(ctx,120,now+.1,.16,'square',.04)}
async function playTurnSound(){const ctx=await unlockAudio();if(!ctx)return;const now=ctx.currentTime;playTone(ctx,520,now,.05,'sine',.025);playTone(ctx,650,now+.05,.06,'sine',.025)}

function chooseRandomCard(cards){return cards[Math.floor(Math.random()*cards.length)]}
function getCardDeckByType(type){if(type==='health')return HEALTH_CARDS;if(type==='risk')return RISK_CARDS;if(type==='chance')return CHANCE_CARDS;if(type==='energy')return ENERGY_CARDS;if(type==='surgery')return SURGERY_CARDS;return null}
function sleep(ms){return new Promise(resolve=>setTimeout(resolve,ms))}

function serializeState(){return {players:state.players,currentPlayerIndex:state.currentPlayerIndex,lastRoll:state.lastRoll,lastCard:state.lastCard,winner:state.winner,feedback:state.feedback,roomCode:state.roomCode,sender:clientId,timestamp:Date.now()}}
function updateCamera(){const player=currentPlayer();if(!player){state.camera={scale:1,tx:0,ty:0};return}const space=SPACES[player.position];const tx=(50-space.x)*0.55;const ty=(50-space.y)*0.55;state.camera={scale:1.1,tx,ty}}
function applySerializedState(data){state.players=normalizePlayers(data.players||state.players);state.currentPlayerIndex=Math.min(data.currentPlayerIndex||0,Math.max(0,state.players.length-1));state.lastRoll=data.lastRoll??null;state.lastCard=data.lastCard||state.lastCard;state.winner=data.winner??null;state.feedback=data.feedback??null;state.onlineCount=state.players.length;updateCamera()}

function getPresenceKey(){return `${ROOM_PRESENCE_PREFIX}:${state.roomCode}`}
function getStateKey(){return `${LOCAL_CHANNEL_PREFIX}:${state.roomCode}`}
function readPresenceMap(){try{return JSON.parse(localStorage.getItem(getPresenceKey())||'{}')}catch{return {}}}
function writePresenceMap(map){try{localStorage.setItem(getPresenceKey(),JSON.stringify(map))}catch{}}
function updatePresenceHeartbeat(){const presence=readPresenceMap();presence[clientId]={name:state.lobbyName||localStorage.getItem(STORAGE_KEYS.playerName)||'Player',ts:Date.now()};writePresenceMap(presence)}
function cleanupAndApplyPresence(){const now=Date.now();const presence=readPresenceMap();let changed=false;for(const [id,meta] of Object.entries(presence)){if(!meta||!meta.ts||now-meta.ts>15000){delete presence[id];changed=true}}if(changed)writePresenceMap(presence);const existingByOwner=new Map(state.players.map(p=>[p.ownerId,p]));const merged=Object.entries(presence).map(([ownerId,meta])=>existingByOwner.get(ownerId)?{...existingByOwner.get(ownerId),name:meta.name||existingByOwner.get(ownerId).name,ownerId}:{...createBasePlayer(ownerId,meta.name||'Player')});state.players=normalizePlayers(merged.length?merged:[createBasePlayer(clientId,state.lobbyName||'Player')]);state.onlineCount=state.players.length;updateCamera()}
function setupLocalChannel(){if(localChannel){try{localChannel.close()}catch{}}const roomKey=getStateKey();try{localChannel=new BroadcastChannel(roomKey);localChannel.onmessage=(event)=>{const data=event.data;if(!data||data.sender===clientId)return;applySerializedState(data);cleanupAndApplyPresence();state.connectionLabel='Local sync connected';safeRender()}}catch{}
  window.onstorage=(e)=>{if(e.key===roomKey&&e.newValue){try{const data=JSON.parse(e.newValue);if(data.sender!==clientId){applySerializedState(data);cleanupAndApplyPresence();state.connectionLabel='Local sync connected';safeRender()}}catch{}}if(e.key===getPresenceKey()){cleanupAndApplyPresence();safeRender()}}
  clearInterval(presenceTimer);updatePresenceHeartbeat();presenceTimer=setInterval(()=>{updatePresenceHeartbeat();cleanupAndApplyPresence()},5000)
}
async function broadcastState(){const payload=serializeState();if(roomChannel){await roomChannel.send({type:'broadcast',event:'game-state',payload})}if(localChannel)localChannel.postMessage(payload);try{localStorage.setItem(getStateKey(),JSON.stringify(payload))}catch{}}
async function connectRealtime(){if(isSupabaseConfigured()&&!supabase){supabase=createClient(SUPABASE_CONFIG.url,SUPABASE_CONFIG.anonKey)}
  setupLocalChannel();
  if(!supabase)return;
  if(roomChannel){await roomChannel.unsubscribe();roomChannel=null}
  roomChannel=supabase.channel(`room-${state.roomCode}`,{config:{broadcast:{self:false},presence:{key:clientId}}});
  roomChannel.on('broadcast',{event:'game-state'},payload=>{if(!payload?.payload||payload.payload.sender===clientId)return;applySerializedState(payload.payload);state.connectionLabel='Supabase live connected';safeRender()});
  roomChannel.on('presence',{event:'sync'},()=>{const presence=roomChannel.presenceState();const metas=Object.values(presence).flatMap(v=>v);const names=new Map(metas.map(meta=>[meta.clientId,meta.name]));const existing=new Map(state.players.map(p=>[p.ownerId,p]));const rebuilt=[];for(const [ownerId,name] of names){rebuilt.push(existing.get(ownerId)?{...existing.get(ownerId),name}:{...createBasePlayer(ownerId,name)})}state.players=normalizePlayers(rebuilt.length?rebuilt:state.players);state.onlineCount=state.players.length;updateCamera();state.connectionLabel='Supabase live connected';broadcastState();safeRender()});
  await roomChannel.subscribe(async status=>{if(status==='SUBSCRIBED'){await roomChannel.track({clientId,name:state.lobbyName||localStorage.getItem(STORAGE_KEYS.playerName)||'Player',roomCode:state.roomCode});state.connectionLabel='Supabase live connected';safeRender()}})
}

function createTrailAt(space){const shell=document.querySelector('.board-stage');if(!shell)return;const dot=document.createElement('div');dot.className='trail-dot';dot.style.left=`${space.x}%`;dot.style.top=`${space.y}%`;shell.appendChild(dot);setTimeout(()=>dot.remove(),620)}
async function showDiceRoll(roll){const overlay=document.getElementById('diceOverlay');const box=document.getElementById('diceBox');const label=document.getElementById('diceLabel');overlay.classList.add('show');label.textContent='Rolling...';const faces=['🎲','⚀','⚁','⚂','⚃','⚄','⚅'];for(let i=0;i<8;i+=1){box.textContent=faces[(i%6)+1];await sleep(90)}box.textContent=String(roll);label.textContent='Move!';await sleep(550);overlay.classList.remove('show')}
function pulseLanding(spaceId){requestAnimationFrame(()=>{const el=document.querySelector(`[data-space-id="${spaceId}"]`);if(!el)return;el.classList.remove('land');void el.offsetWidth;el.classList.add('land')})}

function saveNameQuietly(value){state.lobbyName=value.slice(0,18);localStorage.setItem(STORAGE_KEYS.playerName,state.lobbyName);const me=myPlayer();if(me)me.name=state.lobbyName;updatePresenceHeartbeat();cleanupAndApplyPresence()}
async function commitNameChange(value){saveNameQuietly(value);if(roomChannel){await roomChannel.track({clientId,name:state.lobbyName,roomCode:state.roomCode})}await broadcastState()}
function ensureJoinedPlayer(){updatePresenceHeartbeat();cleanupAndApplyPresence();const mine=myPlayer();if(!mine){state.players=normalizePlayers([...state.players,createBasePlayer(clientId,state.lobbyName||localStorage.getItem(STORAGE_KEYS.playerName)||`Player ${state.players.length+1}`)]);updatePresenceHeartbeat();cleanupAndApplyPresence()}state.onlineCount=state.players.length;updateCamera()}
function startTrivia(){state.trivia=TRIVIA_QUESTIONS[Math.floor(Math.random()*TRIVIA_QUESTIONS.length)];state.timer=30;state.feedback=null;playTriviaOpenSound();safeRender()}
function applyCardForType(type,player){const deck=getCardDeckByType(type);if(!deck)return{player,card:null,attackBack:0,nextMiss:false,organAward:null};const picked=chooseRandomCard(deck);let updatedPlayer=picked.effect(player),organAward=null;if(picked.collectOrgan){const available=ORGAN_POOL.filter(organ=>!updatedPlayer.organs.includes(organ));organAward=available.length?available[Math.floor(Math.random()*available.length)]:ORGAN_POOL[Math.floor(Math.random()*ORGAN_POOL.length)];updatedPlayer={...updatedPlayer,organs:[...updatedPlayer.organs,organAward]}}return{player:updatedPlayer,card:picked,attackBack:picked.attackBack||0,nextMiss:!!picked.nextMiss,organAward}}

async function handleRoll(){if(state.winner||state.trivia||state.isRolling)return;const turnPlayer=currentPlayer();if(!turnPlayer)return;await unlockAudio();playDiceSound();state.feedback=null;state.isRolling=true;if(Math.random()<0.24){state.isRolling=false;startTrivia();return}const roll=Math.floor(Math.random()*6)+1;state.lastRoll=roll;await showDiceRoll(roll);const updated=[...state.players];let player={...updated[state.currentPlayerIndex]};if(player.skipped>0){player.skipped-=1;updated[state.currentPlayerIndex]=player;state.players=normalizePlayers(updated);state.lastCard={text:`${getPlayerName(player)} lost this turn.`};state.currentPlayerIndex=(state.currentPlayerIndex+1)%updated.length;state.isRolling=false;playTurnSound();updateCamera();safeRender();broadcastState();return}if(player.quarantined>0){player.quarantined-=1;updated[state.currentPlayerIndex]=player;state.players=normalizePlayers(updated);state.lastCard={text:`${getPlayerName(player)} is in quarantine and must stay 1 turn.`};state.currentPlayerIndex=(state.currentPlayerIndex+1)%updated.length;state.isRolling=false;playTurnSound();updateCamera();safeRender();broadcastState();return}
  state.movingPlayerId=player.id;safeRender();
  for(let step=0;step<roll;step+=1){player.position=Math.min(SPACES.length-1,player.position+1);updated[state.currentPlayerIndex]=player;state.players=normalizePlayers(updated);createTrailAt(SPACES[player.position]);updateCamera();safeRender();await sleep(170);if(player.position>=SPACES.length-1)break}
  const landed=SPACES[player.position];let extraTurn=false,logText=`${getPlayerName(player)} landed on ${landed.name}.`;
  if(landed.type==='safe'){playSafeSound();player.shields+=1;player.score+=1;logText=`${getPlayerName(player)} reached a safe point and gained 1 shield.`}
  if(landed.type==='quarantine'){playQuarantineSound();player.quarantined=1;player.score=Math.max(0,player.score-1);logText=`${getPlayerName(player)} landed on a bad quarantine spot: lose 1 point and stay 1 turn.`}
  if(['health','risk','chance','energy','surgery'].includes(landed.type)){
    const result=applyCardForType(landed.type,player);player=result.player;extraTurn=!!player.extraTurn;player.extraTurn=false;
    if(result.attackBack>0&&state.players.length>1){const targetIndex=(state.currentPlayerIndex+1)%updated.length,target={...updated[targetIndex]};target.position=Math.max(0,target.position-result.attackBack);updated[targetIndex]=target;logText=`${result.card?.text||'Energy card.'} ${getPlayerName(target)} goes back ${result.attackBack} spaces.`}
    else if(result.nextMiss&&state.players.length>1){const targetIndex=(state.currentPlayerIndex+1)%updated.length,target={...updated[targetIndex]};target.skipped+=1;updated[targetIndex]=target;logText=`${result.card?.text||'Energy card.'} ${getPlayerName(target)} misses the next turn.`}
    else if(result.organAward){logText=`${result.card?.text||'Chance card.'} ${getPlayerName(player)} collected the ${result.organAward} organ card.`}
    else if(result.card){logText=result.card.text}
  }
  if(player.position>=SPACES.length-1){player.position=SPACES.length-1;state.winner=player.name;logText=`${getPlayerName(player)} reached the brain. Quick recovery!`}
  updated[state.currentPlayerIndex]=player;state.players=normalizePlayers(updated);state.lastCard={text:logText};state.movingPlayerId=null;state.isRolling=false;pulseLanding(player.position);
  if(!extraTurn&&player.position<SPACES.length-1){state.currentPlayerIndex=(state.currentPlayerIndex+1)%updated.length;playTurnSound()}
  updateCamera();safeRender();broadcastState();
}

async function submitTrivia(answer){if(!state.trivia)return;await unlockAudio();const correct=answer===state.trivia.a,reward=state.trivia.reward||2,updated=[...state.players],player={...updated[state.currentPlayerIndex]};if(correct){playCorrectSound();player.position=Math.min(SPACES.length-1,player.position+reward);player.score+=reward}else{playWrongSound()}if(player.position>=SPACES.length-1){player.position=SPACES.length-1;state.winner=player.name}updated[state.currentPlayerIndex]=player;state.players=normalizePlayers(updated);state.feedback={ok:correct,text:correct?`Correct! Move forward ${reward} ${reward===1?'space':'spaces'}.`:'Wrong answer. Stay in the same spot.'};state.lastCard={text:correct?`${getPlayerName(player)} answered correctly and moved forward ${reward} ${reward===1?'space':'spaces'}.`:`${getPlayerName(player)} answered incorrectly and stayed in place.`};state.trivia=null;state.timer=30;pulseLanding(player.position);updateCamera();safeRender();broadcastState()}
function resetGame(){state.players=normalizePlayers(state.players.map(player=>({...player,position:0,shields:0,quarantined:0,skipped:0,extraTurn:false,score:0,organs:[]})));state.currentPlayerIndex=0;state.lastRoll=null;state.lastCard={text:'Roll the dice to begin.'};state.winner=null;state.trivia=null;state.feedback=null;state.movingPlayerId=null;updateCamera();safeRender();broadcastState()}
async function enterRoom(){state.roomCode=(state.joinCode.trim()||state.roomCode).toUpperCase();state.entered=true;ensureJoinedPlayer();state.connectionLabel=isSupabaseConfigured()?'Connecting Supabase...':'Offline local mode';playTurnSound();await connectRealtime();safeRender();broadcastState()}
async function copyShareLink(){const url=`${location.origin}?room=${state.roomCode}`;try{await navigator.clipboard.writeText(url);state.lastCard={text:'Room link copied.'}}catch{state.lastCard={text:'Could not copy automatically.'}}safeRender()}
function sortedPlayers(){return[...state.players].sort((a,b)=>b.score-a.score||b.position-a.position)}
function escapeHtml(value){return String(value).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;')}

function boardMarkup(){const connectors=SPACES.slice(0,-1).map((space,index)=>`<line x1="${space.x}" y1="${space.y}" x2="${SPACES[index+1].x}" y2="${SPACES[index+1].y}" stroke="rgba(255,255,255,.28)" stroke-width="0.85" stroke-linecap="round" />`).join('');const focusId=currentPlayer()?currentPlayer().position:null;const spacesMarkup=SPACES.map(space=>{const onSpace=state.players.filter(player=>player.position===space.id);const currentClass=focusId===space.id?' current-turn':'';return`<div class="space ${space.type||'normal'}${currentClass}" data-space-id="${space.id}" style="left:${space.x}%;top:${space.y}%;--delay:${(space.id%7)*0.12}s"><div class="space-id">#${space.id}</div><div class="space-name">${escapeHtml(space.name)}</div><div class="space-body">${escapeHtml(space.body)}</div><div class="space-tokens">${onSpace.map(player=>`<span class="token-with-name"><span class="token-pill">${getPlayerToken(player.id-1)}</span><span class="token-name">${escapeHtml(getPlayerName(player))}</span></span>`).join('')}</div></div>`}).join('');return`<div class="board-shell"><div class="board-camera" style="transform:translate(${state.camera.tx}%, ${state.camera.ty}%) scale(${state.camera.scale})"><div class="board-stage"><div class="board-rails"></div><img class="board-image" src="${ANATOMY_IMAGE_URL}" alt="anatomy board" /><svg class="board-svg connectors" viewBox="0 0 100 100" preserveAspectRatio="none">${connectors}</svg><div class="board-overlay"></div><div class="board-label finish">Finish</div><div class="board-label start">Start</div>${spacesMarkup}</div></div></div>`}
function lobbyScreen(){return`<div class="screen"><div class="lobby-wrap"><div class="lobby-left"><div class="brand"><div class="logo">🫀</div><div><div class="domain">${SITE_DOMAIN}</div><div class="title">${GAME_TITLE}</div><div class="subtitle">${SUBTITLE}</div><div class="subtitle">${SCHOOL}</div></div></div><div class="code-box"><div style="text-align:center;font-size:28px;font-weight:900">Join at ${SITE_DOMAIN}</div><div style="text-align:center;font-size:18px;color:#63747e;margin-top:8px">with your anatomy room code</div><div class="code-big"><div class="small">Anatomy Room Code</div><div class="code">${state.roomCode}</div></div></div></div><div class="lobby-right glass"><div><div class="lobby-tag">Lobby</div><div class="lobby-title">Waiting for participants</div><div class="lobby-copy">Roll the dice, land on anatomy squares, collect good or bad cards, answer trivia, and race to the brain for a quick recovery win.</div></div><div class="entry-card"><div class="entry-label">Your Name</div><input class="entry-input" id="playerNameInput" placeholder="ENTER YOUR NAME" value="${escapeHtml(state.lobbyName)}" /></div><div class="entry-card"><div class="entry-label">Enter Code</div><input class="entry-input" id="joinCodeInput" placeholder="ENTER CODE" value="${escapeHtml(state.joinCode)}" /></div><div class="entry-actions"><button class="btn btn-white" data-action="new-code">New Code</button><button class="btn btn-main" data-action="start-room">Start Room</button></div><div class="mini-box" style="margin-top:14px">${state.connectionLabel}<div class="sync-note">Supabase multiplayer activates after you paste your project URL and anon key into SUPABASE_CONFIG.</div></div></div></div></div>`}
function gameScreen(){const cp=currentPlayer();return`<div class="screen"><div class="game-layout"><div class="topbar glass"><div class="topbar-left"><div class="logo" style="width:58px;height:58px;border-radius:18px">🫀</div><div style="min-width:0"><div class="domain" style="color:#8be4d8">${SITE_DOMAIN}</div><div class="topbar-meta">${SUBTITLE}</div><div class="topbar-meta">North-West College • West Covina, CA</div><div class="topbar-title">${GAME_TITLE}</div></div></div><div class="chip-row"><div class="chip">Room: ${state.roomCode}</div><div class="chip alt">${state.onlineCount} Online</div><div class="chip">${state.connectionLabel}</div><button class="btn btn-small" style="background:rgba(255,255,255,.08);color:#fff" data-action="back-home">Back</button></div></div><div class="board-panel">${boardMarkup()}</div><div class="hud-wrap"><div class="hud-card"><div class="hud-title">Current Turn</div><div class="turn-hero"><div style="font-size:13px;opacity:.84">Reach the brain to win</div><h3>${state.winner?`${escapeHtml(state.winner)} wins!`:escapeHtml(getPlayerName(cp))}</h3><p>Last Roll: ${state.lastRoll??'-'}</p></div><div class="mini-box">Room link: ${location.origin}?room=${state.roomCode}<div class="sync-note">Kahoot-style join is enabled from the lobby name + room code flow.</div></div></div><div class="hud-card"><div class="hud-title">Game Actions</div><div class="controls-grid"><button class="btn btn-teal" data-action="roll" ${state.winner||state.trivia||state.isRolling?'disabled':''}>${state.isRolling?'🎲 Rolling...':'🎲 Roll'}</button><button class="btn btn-rose" data-action="reset">↻ Reset</button><button class="btn btn-blue" data-action="share">⤴ Share</button><button class="btn btn-green" data-action="new-code-in-game">New Code</button></div><div style="margin-top:14px">${state.feedback?`<div class="feedback ${state.feedback.ok?'good':'bad'}">${escapeHtml(state.feedback.text)}</div>`:''}<div class="action-box">${escapeHtml(state.lastCard?.text||'Roll the dice to begin.')}</div></div></div><div class="hud-card"><div class="hud-title">Players</div><div class="players-strip">${state.players.map(player=>`<div class="player-card"><div class="player-top"><div class="avatar">${getPlayerToken(player.id-1)}</div><div style="flex:1;font-weight:800">${escapeHtml(getPlayerName(player))}</div></div><div style="display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap"><div style="font-size:12px;color:#c9d6d8">${escapeHtml(SPACES[player.position].name)}</div><div class="stats"><span class="badge teal">${player.shields} shield</span><span class="badge gray">${player.score} pts</span><span class="badge green">${player.organs.length} organs</span></div></div></div>`).join('')}</div></div><div class="hud-card"><div class="hud-title">Leaderboard</div><div class="leaderboard-list">${sortedPlayers().map((player,index)=>`<div class="leader-card"><div class="leader-row"><div class="leader-left"><div class="leader-rank">#${index+1}</div><div>${getPlayerToken(player.id-1)}</div><div class="leader-name">${escapeHtml(getPlayerName(player))}</div></div><div style="text-align:right;font-size:12px;color:#bdcfd0"><div>${player.score} pts</div><div>${player.organs.length} organs</div><div>${escapeHtml(SPACES[player.position].name)}</div></div></div></div>`).join('')}</div></div></div><div class="trivia-modal ${state.trivia?'show':''}" id="triviaModal">${state.trivia?`<div class="trivia-card"><div class="trivia-top"><div style="font-size:24px;font-weight:1000">✨ Trivia</div><div class="pill-time">${state.timer}s</div></div><div class="trivia-q">${escapeHtml(state.trivia.q)}</div><div class="trivia-grid">${state.trivia.choices.map((choice,index)=>{const classes=['btn-rose','btn-blue','btn-white','btn-green'];return`<button class="btn trivia-choice ${classes[index]||'btn-teal'}" data-trivia-choice="${escapeHtml(choice)}">${escapeHtml(choice)}</button>`}).join('')}</div><div class="footer-note" style="margin-top:12px">Answer correctly to move forward.</div></div>`:''}</div></div>`}

function attachEvents(){
  const joinInput=document.getElementById('joinCodeInput'); if(joinInput)joinInput.addEventListener('input',e=>{state.joinCode=e.target.value.toUpperCase()});
  const nameInput=document.getElementById('playerNameInput'); if(nameInput){nameInput.addEventListener('input',e=>{saveNameQuietly(e.target.value); clearTimeout(nameSaveTimer); nameSaveTimer=setTimeout(()=>commitNameChange(e.target.value),600)}); nameInput.addEventListener('keydown',e=>e.stopPropagation())}
  document.querySelectorAll('[data-trivia-choice]').forEach(el=>el.addEventListener('click',()=>submitTrivia(el.getAttribute('data-trivia-choice'))));
  document.querySelectorAll('[data-action]').forEach(el=>el.addEventListener('click',()=>{const action=el.getAttribute('data-action'); if(action==='new-code'){const code=randomRoomCode(); state.joinCode=code; state.roomCode=code; safeRender()} if(action==='start-room')enterRoom(); if(action==='back-home'){state.entered=false; safeRender()} if(action==='roll')handleRoll(); if(action==='reset')resetGame(); if(action==='share')copyShareLink(); if(action==='new-code-in-game'){state.roomCode=randomRoomCode(); connectRealtime(); broadcastState(); safeRender()}}));
}
function tickTrivia(){if(!state.trivia)return;state.timer-=1;if(state.timer<=0){state.lastCard={text:'Time is up. No trivia bonus.'};state.trivia=null;state.timer=30}safeRender()}
function safeRender(){if(isRendering)return;isRendering=true;requestAnimationFrame(()=>{document.getElementById('app').innerHTML=state.entered?gameScreen():lobbyScreen();attachEvents();isRendering=false;})}

setupLocalChannel(); updateCamera(); setInterval(tickTrivia,1000); safeRender();
</script>
</body>
</html>
